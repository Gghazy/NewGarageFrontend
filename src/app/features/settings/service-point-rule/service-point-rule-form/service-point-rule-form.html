<div class="modal-header">
  <h5 class="modal-title">{{ title }}</h5>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body" [formGroup]="form">
  <div class="mb-3">
    <div class="row">
      <div class="col-md-6">
        <label class="form-label">{{ 'SERVICE_POINT_RULE.FORM.FROM_AMOUNT' | translate }}</label>
        <div class="input-group">
          <input type="number" class="form-control" formControlName="fromAmount" min="0" step="0.01"
            placeholder="{{ 'SERVICE_POINT_RULE.FORM.FROM_AMOUNT_PLACEHOLDER' | translate }}" />
          <span class="input-group-text">{{ 'SERVICE_POINT_RULE.FORM.SAR' | translate }}</span>
        </div>
        <div class="text-danger small" *ngIf="form.get('fromAmount')?.touched && form.get('fromAmount')?.invalid">
          {{ 'COMMON.REQUIRED' | translate }}
        </div>
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ 'SERVICE_POINT_RULE.FORM.TO_AMOUNT' | translate }}</label>
        <div class="input-group">
          <input type="number" class="form-control" formControlName="toAmount" min="0.01" step="0.01"
            placeholder="{{ 'SERVICE_POINT_RULE.FORM.TO_AMOUNT_PLACEHOLDER' | translate }}" />
          <span class="input-group-text">{{ 'SERVICE_POINT_RULE.FORM.SAR' | translate }}</span>
        </div>
        <div class="text-danger small" *ngIf="form.get('toAmount')?.touched && form.get('toAmount')?.invalid">
          {{ 'COMMON.REQUIRED' | translate }}
        </div>
      </div>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">{{ 'SERVICE_POINT_RULE.FORM.POINTS' | translate }}</label>
    <input type="number" class="form-control" formControlName="points" min="1" step="1"
      placeholder="{{ 'SERVICE_POINT_RULE.FORM.POINTS_PLACEHOLDER' | translate }}" />
    <div class="text-danger small" *ngIf="form.get('points')?.touched && form.get('points')?.invalid">
      {{ 'COMMON.REQUIRED' | translate }}
    </div>
  </div>

  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" formControlName="isActive" id="isActivePointCheck" />
    <label class="form-check-label" for="isActivePointCheck">{{ 'SERVICE_POINT_RULE.FORM.IS_ACTIVE' | translate }}</label>
  </div>

  <div class="modal-footer">
    <button class="btn btn-light" [disabled]="loading" (click)="activeModal.dismiss()">{{ 'COMMON.CANCEL' | translate }}</button>
    <button class="btn btn-primary" [disabled]="loading" (click)="submit()">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      {{ 'COMMON.SAVE' | translate }}
    </button>
  </div>
</div>
